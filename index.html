<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Log</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');

  :root {
    --bg: #f5f0eb;
    --bg-card: #ffffff;
    --bg-dark: #1a1714;
    --text: #1a1714;
    --text-muted: #8c847a;
    --accent: #e84e1b;
    --accent2: #ff7849;
    --gold: #c9952b;
    --border: rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-pill: 999px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* NOISE TEXTURE OVERLAY */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  /* SCROLL ANIMATIONS */
  .fade-up {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* LOADING */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 0.9em;
    color: var(--text-muted);
  }

  /* HERO */
  .hero {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 420px;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.35) saturate(1.1);
  }
  .hero-content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 80px 24px;
  }
  .hero-eyebrow {
    font-size: 0.78em;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: clamp(3.5em, 10vw, 7em);
    font-weight: 400;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
    color: #fff;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--accent2);
  }
  .hero .subtitle {
    font-size: 1.05em;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
  }

  /* STATS PILLS */
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 0 24px 48px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
    margin-top: -32px;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    padding: 10px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .stat-pill .num {
    font-weight: 700;
    font-size: 1.15em;
    color: var(--text);
  }
  .stat-pill .lbl {
    font-size: 0.82em;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* TAB NAV */
  .tab-nav {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 14px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .tab-btn {
    background: none;
    border: 1.5px solid transparent;
    color: var(--text-muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.88em;
    font-weight: 500;
    padding: 8px 22px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .tab-btn:hover { color: var(--text); border-color: var(--border); }
  .tab-btn.active {
    color: #fff;
    background: var(--bg-dark);
    border-color: var(--bg-dark);
  }

  /* SECTIONS */
  .section { display: none; }
  .section.active { display: block; }
  .section-inner { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

  /* ===== GALLERY GRID ===== */
  .gallery-wrap { padding: 32px 0 60px; }
  .masonry {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .pizza-card {
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: var(--bg-card);
    border: 1px solid var(--border);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .pizza-card:hover {
    transform: translateY(-3px) scale(1.008);
    box-shadow: 0 16px 48px rgba(0,0,0,0.12);
  }
  .pizza-card img {
    width: 100%;
    display: block;
    transition: transform 0.4s ease;
  }
  .pizza-card:hover img { transform: scale(1.04); }
  .pizza-img-wrap { overflow: hidden; position: relative; }
  .pizza-rating-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--bg-dark);
    color: #fff;
    font-size: 0.72em;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: var(--radius-pill);
    letter-spacing: 0.03em;
    backdrop-filter: blur(8px);
  }
  .pizza-info {
    padding: 12px 14px 14px;
  }
  .pizza-name {
    display: block;
    font-weight: 600;
    font-size: 0.92em;
    line-height: 1.3;
  }
  .pizza-meta {
    display: block;
    font-size: 0.78em;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .pizza-problems {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }
  .problem-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #e53935;
    display: inline-block;
    opacity: 0.7;
  }

  /* ===== STATS TAB ===== */
  .stats-section { padding: 48px 0 60px; }

  /* Hall of Fame */
  .hof { margin-bottom: 64px; }
  .section-title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.8em, 4vw, 2.8em);
    font-weight: 400;
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: -0.02em;
  }
  .section-title em { font-style: italic; color: var(--accent); }
  .top-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .top-pizza {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 3/4;
    cursor: pointer;
  }
  .top-pizza img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }
  .top-pizza:hover img { transform: scale(1.05); }
  .top-pizza-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
  }
  .top-pizza-score {
    font-family: 'Instrument Serif', serif;
    font-size: 3em;
    font-weight: 400;
    color: #fff;
    line-height: 1;
    margin-bottom: 4px;
  }
  .top-pizza-name {
    font-weight: 600;
    font-size: 1em;
    color: #fff;
  }
  .top-pizza-date {
    font-size: 0.78em;
    color: rgba(255,255,255,0.6);
  }

  /* Leaderboard */
  .leaderboard {
    max-width: 640px;
    margin: 0 auto;
  }
  .lb-header {
    display: grid;
    grid-template-columns: 1fr 200px 48px 48px;
    gap: 12px;
    padding: 0 0 10px;
    border-bottom: 1.5px solid var(--text);
    font-size: 0.7em;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .lb-row {
    display: grid;
    grid-template-columns: 1fr 200px 48px 48px;
    gap: 12px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .lb-row:hover { background: rgba(0,0,0,0.02); }
  .lb-name { font-weight: 500; font-size: 0.92em; }
  .lb-bar-wrap {
    height: 6px;
    background: rgba(0,0,0,0.06);
    border-radius: 3px;
    overflow: hidden;
  }
  .lb-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .lb-count {
    text-align: center;
    font-size: 0.88em;
    font-weight: 600;
    color: var(--text);
  }
  .lb-avg {
    text-align: center;
    font-size: 0.88em;
    font-weight: 700;
    color: var(--gold);
  }

  /* ===== SESSIONS TAB ===== */
  .sessions-section { padding: 32px 0 60px; }
  .year-nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 0 32px;
    flex-wrap: wrap;
  }
  .year-nav a {
    color: var(--text-muted);
    text-decoration: none;
    padding: 7px 18px;
    border-radius: var(--radius-pill);
    font-size: 0.88em;
    font-weight: 500;
    border: 1.5px solid var(--border);
    transition: all 0.2s;
  }
  .year-nav a:hover { border-color: var(--text); color: var(--text); }
  .year-header {
    font-family: 'Instrument Serif', serif;
    font-size: 2.4em;
    font-weight: 400;
    color: var(--text);
    margin: 48px 0 24px;
    letter-spacing: -0.02em;
  }
  .session-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    transition: box-shadow 0.2s;
  }
  .session-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .card-title h3 {
    font-size: 1.2em;
    font-weight: 600;
  }
  .card-date {
    font-size: 0.85em;
    color: var(--text-muted);
  }
  .session-pizzaiolo {
    display: inline-block;
    background: rgba(232, 78, 27, 0.08);
    color: var(--accent);
    padding: 3px 12px;
    border-radius: var(--radius-pill);
    font-size: 0.78em;
    font-weight: 600;
    margin-top: 6px;
  }
  .card-ratings { display: flex; gap: 16px; }
  .rating-item { text-align: center; }
  .rating-label {
    display: block;
    font-size: 0.68em;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stars { color: var(--gold); font-size: 0.9em; letter-spacing: 1px; }

  .session-pizza-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 0 0 16px;
    margin-bottom: 16px;
  }
  .session-pizza-strip::-webkit-scrollbar { height: 4px; }
  .session-pizza-strip::-webkit-scrollbar-track { background: transparent; }
  .session-pizza-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .strip-pizza {
    flex: 0 0 auto;
    width: 150px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .strip-pizza img {
    width: 100%; height: 110px;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }
  .strip-info {
    padding: 6px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.78em;
  }
  .strip-rating { color: var(--gold); font-weight: 700; }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }
  .photo-item {
    position: relative;
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .photo-item img {
    width: 100%; height: 180px;
    object-fit: cover;
    display: block;
    cursor: pointer;
    transition: transform 0.25s;
  }
  .photo-item img:hover { transform: scale(1.03); }
  .photo-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.55);
    color: white;
    font-size: 0.7em; font-weight: 500;
    padding: 3px 8px;
    text-align: center;
  }
  .details-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 6px;
    margin-bottom: 12px;
  }
  .detail {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .detail-label {
    display: block;
    font-size: 0.65em;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }
  .detail-value { font-size: 0.95em; font-weight: 600; }
  .problems { margin-bottom: 12px; }
  .problem-tag {
    display: inline-block;
    background: rgba(229, 57, 53, 0.08);
    color: #c62828;
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    font-size: 0.78em;
    font-weight: 500;
    margin-right: 6px;
    margin-bottom: 4px;
  }
  .guests {
    font-size: 0.85em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .notes {
    font-size: 0.88em;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    padding-top: 12px;
    line-height: 1.7;
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 10000;
    cursor: pointer;
    justify-content: center;
    align-items: center;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    border-radius: var(--radius);
    box-shadow: 0 12px 60px rgba(0,0,0,0.4);
  }

  /* FOOTER */
  .site-footer {
    text-align: center;
    padding: 32px 24px;
    font-size: 0.78em;
    color: var(--text-muted);
  }
  .site-footer a {
    color: var(--text-muted);
    text-decoration: none;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .site-footer a:hover { opacity: 1; }

  /* RESPONSIVE */
  @media (max-width: 1100px) {
    .masonry { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 800px) {
    .masonry { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .top-grid { grid-template-columns: repeat(2, 1fr); }
    .lb-header, .lb-row { grid-template-columns: 1fr 120px 40px 40px; gap: 8px; }
  }
  @media (max-width: 550px) {
    .hero { padding: 64px 20px 48px; }
    .masonry { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .pizza-card { border-radius: var(--radius-sm); }
    .pizza-info { padding: 8px 10px 10px; }
    .pizza-name { font-size: 0.82em; }
    .pizza-meta { font-size: 0.72em; }
    .top-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .details-grid { grid-template-columns: 1fr 1fr; }
    .card-header { flex-direction: column; }
    .section-inner { padding: 0 14px; }
    .stat-pill { padding: 8px 14px; }
    .stat-pill .num { font-size: 1em; }
  }
</style>
</head>
<body>

<div id="loading" class="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">Loading pizza data...</div>
</div>

<div id="app" style="display:none">
  <!-- Hero -->
  <div class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-content fade-up">
      <div class="hero-eyebrow" id="hero-eyebrow"></div>
      <h1>Pizza<br><em>Log</em></h1>
      <p class="subtitle" id="hero-subtitle"></p>
    </div>
  </div>

  <div class="stats-row fade-up" id="stats-row"></div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="stats">Hall of Fame</button>
    <button class="tab-btn" data-tab="gallery">Gallery</button>
    <button class="tab-btn" data-tab="sessions">Sessions</button>
  </div>

  <!-- GALLERY TAB -->
  <div class="section" id="tab-gallery">
    <div class="section-inner">
      <div class="gallery-wrap">
        <div class="masonry" id="gallery-grid"></div>
      </div>
    </div>
  </div>

  <!-- STATS / HALL OF FAME TAB -->
  <div class="section active" id="tab-stats">
    <div class="section-inner">
      <div class="stats-section">
        <div class="hof fade-up">
          <h2 class="section-title">Hall of <em>Fame</em></h2>
          <div class="top-grid" id="top-grid"></div>
        </div>
        <div class="leaderboard fade-up">
          <h2 class="section-title">By <em>Type</em></h2>
          <div class="lb-header">
            <span>Type</span><span></span><span>#</span><span>Avg</span>
          </div>
          <div id="leaderboard-rows"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- SESSIONS TAB -->
  <div class="section" id="tab-sessions">
    <div class="section-inner sessions-section" style="max-width:900px">
      <nav class="year-nav" id="year-nav"></nav>
      <div id="session-cards"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="site-footer">
    <a href="admin.html">admin</a>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
  <img id="lightbox-img" src="" alt="Full size">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://uwerozmqqhgvvwvsbzzi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3ZXJvem1xcWhndnZ3dnNienppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MjY3ODAsImV4cCI6MjA4NzMwMjc4MH0.Q0u_Qgn_964V6ETn2YuzHZTYve37d6YAXhWG1UBWKiA';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function storageUrl(bucket, path) {
  return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`;
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function formatPercent(v) {
  if (v == null) return '';
  return Math.round(v * 100) + '%';
}

function starRating(n, max) {
  if (!n) return '';
  max = max || 10;
  return '<span class="stars">' + '\u2605'.repeat(Math.min(n, max)) + '\u2606'.repeat(max - Math.min(n, max)) + '</span>';
}

function formatDate(dateStr, opts) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', opts || { year: 'numeric', month: 'short' });
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}

async function loadData() {
  const [
    { data: sessions },
    { data: pizzas },
    { data: pizzaioli },
    { data: sessionPhotos }
  ] = await Promise.all([
    sb.from('sessions').select('*').order('date', { ascending: false }),
    sb.from('pizzas').select('*'),
    sb.from('pizzaioli').select('*'),
    sb.from('session_photos').select('*'),
  ]);

  // Build lookup maps
  const pizzaioloMap = {};
  pizzaioli.forEach(p => pizzaioloMap[p.id] = p);

  const sessionMap = {};
  sessions.forEach(s => sessionMap[s.id] = s);

  // Group session photos
  const sessionPhotoMap = {};
  sessionPhotos.forEach(sp => {
    if (!sessionPhotoMap[sp.session_id]) sessionPhotoMap[sp.session_id] = [];
    sessionPhotoMap[sp.session_id].push(sp);
  });

  // Enrich pizzas with session data
  for (const pizza of pizzas) {
    pizza._session = pizza.session_id ? sessionMap[pizza.session_id] : null;
    pizza._pizzaiolo = pizza.pizzaiolo_id ? pizzaioloMap[pizza.pizzaiolo_id] : null;
  }

  // Group pizzas by session
  const pizzasBySession = {};
  for (const p of pizzas) {
    if (p.session_id) {
      if (!pizzasBySession[p.session_id]) pizzasBySession[p.session_id] = [];
      pizzasBySession[p.session_id].push(p);
    }
  }

  // Stats
  const totalSessions = sessions.length;
  const totalPizzas = pizzas.length;
  const ratedPizzas = pizzas.filter(p => p.rating);
  const avgRating = ratedPizzas.length > 0
    ? ratedPizzas.reduce((s, p) => s + p.rating, 0) / ratedPizzas.length
    : 0;

  // Pizza types
  const byType = {};
  for (const p of pizzas) {
    const name = p.name || 'Unknown';
    if (!byType[name]) byType[name] = [];
    byType[name].push(p);
  }
  const typeNames = Object.keys(byType).sort((a, b) => byType[b].length - byType[a].length);

  // Top rated pizzas with photos
  const topRatedPizzas = [...pizzas]
    .filter(p => p.rating && p.photo_path)
    .sort((a, b) => (b.rating || 0) - (a.rating || 0))
    .slice(0, 6);

  // Hero
  const heroPizza = topRatedPizzas.length > 0 ? topRatedPizzas[0] : null;
  if (heroPizza) {
    document.getElementById('hero-bg').innerHTML = `<img src="${storageUrl('pizza-photos', heroPizza.photo_path)}" alt="Pizza">`;
  }

  const dates = sessions.filter(s => s.date).map(s => s.date).sort();
  const firstYear = dates.length > 0 ? dates[0].substring(0, 4) : '2020';
  document.getElementById('hero-eyebrow').textContent = `Since ${firstYear}`;
  document.getElementById('hero-subtitle').textContent = `${totalSessions} sessions / ${totalPizzas} pizzas / ${typeNames.length} varieties`;

  // Stats row
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-pill"><span class="num">${totalSessions}</span><span class="lbl">Sessions</span></div>
    <div class="stat-pill"><span class="num">${totalPizzas}</span><span class="lbl">Pizzas</span></div>
    <div class="stat-pill"><span class="num">${avgRating.toFixed(1)}</span><span class="lbl">Avg Rating</span></div>
    <div class="stat-pill"><span class="num">${typeNames.length}</span><span class="lbl">Varieties</span></div>
  `;

  // ===== HALL OF FAME =====
  let topHTML = '';
  for (const p of topRatedPizzas) {
    const imgUrl = storageUrl('pizza-photos', p.photo_path);
    const dateStr = p._session ? formatDate(p._session.date) : '';
    topHTML += `<div class="top-pizza fade-up" onclick="openLightbox('${imgUrl}')">
      <img src="${imgUrl}" alt="${escapeHtml(p.name)}" loading="lazy">
      <div class="top-pizza-overlay">
        <div class="top-pizza-score">${p.rating}/10</div>
        <div class="top-pizza-name">${escapeHtml(p.name)}</div>
        <div class="top-pizza-date">${dateStr}</div>
      </div>
    </div>`;
  }
  document.getElementById('top-grid').innerHTML = topHTML;

  // ===== LEADERBOARD =====
  const typeStats = typeNames.slice(0, 12).map(name => {
    const count = byType[name].length;
    const rated = byType[name].filter(p => p.rating);
    const avg = rated.length > 0 ? (rated.reduce((s, p) => s + p.rating, 0) / rated.length).toFixed(1) : '-';
    return { name, count, avg };
  });

  let lbHTML = '';
  for (const ts of typeStats) {
    const pct = totalPizzas > 0 ? Math.round((ts.count / totalPizzas) * 100) : 0;
    lbHTML += `<div class="lb-row">
      <span class="lb-name">${escapeHtml(ts.name)}</span>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
      <span class="lb-count">${ts.count}</span>
      <span class="lb-avg">${ts.avg}</span>
    </div>`;
  }
  document.getElementById('leaderboard-rows').innerHTML = lbHTML;

  // ===== GALLERY =====
  const galleryPizzas = pizzas
    .filter(p => p.photo_path)
    .sort((a, b) => {
      const rDiff = (b.rating || 0) - (a.rating || 0);
      if (rDiff !== 0) return rDiff;
      const dA = a._session ? a._session.date || '' : '';
      const dB = b._session ? b._session.date || '' : '';
      return dB.localeCompare(dA);
    });

  let galleryHTML = '';
  for (const pizza of galleryPizzas) {
    const imgUrl = storageUrl('pizza-photos', pizza.photo_path);
    const dateStr = pizza._session ? formatDate(pizza._session.date) : '';
    const pizzaioloName = pizza._pizzaiolo ? pizza._pizzaiolo.name : '';
    const problems = pizza.problems || [];
    galleryHTML += `<div class="pizza-card" onclick="openLightbox('${imgUrl}')">
      <div class="pizza-img-wrap">
        <img src="${imgUrl}" alt="${escapeHtml(pizza.name)}" loading="lazy">
        ${pizza.rating ? `<div class="pizza-rating-badge">${pizza.rating}/10</div>` : ''}
      </div>
      <div class="pizza-info">
        <span class="pizza-name">${escapeHtml(pizza.name)}</span>
        <span class="pizza-meta">${dateStr}${pizzaioloName ? ' &middot; ' + escapeHtml(pizzaioloName) : ''}</span>
        ${problems.length > 0 ? '<div class="pizza-problems">' + problems.map(p => `<span class="problem-dot" title="${escapeHtml(p)}"></span>`).join('') + '</div>' : ''}
      </div>
    </div>`;
  }
  document.getElementById('gallery-grid').innerHTML = galleryHTML;

  // ===== SESSIONS =====
  // Group by year
  const byYear = {};
  for (const s of sessions) {
    const year = s.date ? s.date.substring(0, 4) : 'Unknown';
    if (!byYear[year]) byYear[year] = [];
    byYear[year].push(s);
  }
  const years = Object.keys(byYear).sort((a, b) => b.localeCompare(a));

  function sessionHasContent(s) {
    if (s.session_notes) return true;
    if (s.dough_satisfaction) return true;
    if (pizzasBySession[s.id] && pizzasBySession[s.id].length > 0) return true;
    if (sessionPhotoMap[s.id] && sessionPhotoMap[s.id].length > 0) return true;
    if (s.problems_with_dough && s.problems_with_dough.length > 0 && !s.problems_with_dough.includes('None')) return true;
    if (s.guests) return true;
    if (s.flour || s.amount_flour || s.hydration_level != null || s.fermentation_time || s.sourdough_starter != null) return true;
    return false;
  }

  // Year nav
  const validYears = years.filter(y => {
    if (y === 'Unknown') return false;
    return (byYear[y] || []).some(s => sessionHasContent(s));
  });
  document.getElementById('year-nav').innerHTML = validYears.map(y => `<a href="#year-${y}">${y}</a>`).join('');

  // Session cards
  let sessionsHTML = '';
  for (const year of years) {
    if (year === 'Unknown') continue;
    const yearSessions = byYear[year].filter(s => sessionHasContent(s)).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    if (yearSessions.length === 0) continue;

    sessionsHTML += `<h2 class="year-header" id="year-${year}">${year}</h2>\n`;

    for (const s of yearSessions) {
      const dateStr = s.date ? formatDate(s.date, { year: 'numeric', month: 'long', day: 'numeric' }) : 'Unknown date';

      // Session photos
      const photos = sessionPhotoMap[s.id] || [];
      let doughPhotos = '';
      for (const photo of photos) {
        const imgUrl = storageUrl('session-photos', photo.storage_path);
        const label = photo.field_name === 'pizzas' ? 'Session Pizzas' : photo.field_name.replace('dough_', '');
        doughPhotos += `<div class="photo-item"><img src="${imgUrl}" alt="${label}" loading="lazy" onclick="openLightbox('${imgUrl}')"><span class="photo-label">${label}</span></div>\n`;
      }

      // Session pizzas
      const sPizzas = pizzasBySession[s.id] || [];
      let pizzaStrip = '';
      if (sPizzas.length > 0) {
        pizzaStrip = '<div class="session-pizza-strip">';
        for (const sp of sPizzas) {
          if (!sp.photo_path) continue;
          const imgUrl = storageUrl('pizza-photos', sp.photo_path);
          pizzaStrip += `<div class="strip-pizza"><img src="${imgUrl}" alt="${escapeHtml(sp.name)}" loading="lazy" onclick="openLightbox('${imgUrl}')"><div class="strip-info"><span>${escapeHtml(sp.name)}</span>${sp.rating ? `<span class="strip-rating">${sp.rating}/10</span>` : ''}</div></div>`;
        }
        pizzaStrip += '</div>';
      }

      // Details
      let details = '';
      if (s.flour) details += `<div class="detail"><span class="detail-label">Flour</span><span class="detail-value">${escapeHtml(s.flour)}</span></div>`;
      if (s.amount_flour) details += `<div class="detail"><span class="detail-label">Amount</span><span class="detail-value">${s.amount_flour}g</span></div>`;
      if (s.hydration_level != null) details += `<div class="detail"><span class="detail-label">Hydration</span><span class="detail-value">${formatPercent(s.hydration_level)}</span></div>`;
      if (s.sourdough_starter != null) details += `<div class="detail"><span class="detail-label">Starter</span><span class="detail-value">${formatPercent(s.sourdough_starter)}</span></div>`;
      if (s.salt != null) details += `<div class="detail"><span class="detail-label">Salt</span><span class="detail-value">${s.salt}g</span></div>`;
      if (s.ball_weight != null) details += `<div class="detail"><span class="detail-label">Ball Weight</span><span class="detail-value">${s.ball_weight}g</span></div>`;
      if (s.yeast) details += `<div class="detail"><span class="detail-label">Yeast</span><span class="detail-value">${s.yeast.join(', ')}</span></div>`;
      if (s.oil && s.oil !== 'N') details += `<div class="detail"><span class="detail-label">Oil</span><span class="detail-value">${s.oil}</span></div>`;
      if (s.fermentation_time) details += `<div class="detail"><span class="detail-label">Ferment. Time</span><span class="detail-value">${escapeHtml(s.fermentation_time)}h</span></div>`;
      if (s.fermentation_bulk != null) details += `<div class="detail"><span class="detail-label">Bulk Ferment</span><span class="detail-value">${s.fermentation_bulk}h</span></div>`;
      if (s.fermentation_balled != null) details += `<div class="detail"><span class="detail-label">Ball Ferment</span><span class="detail-value">${s.fermentation_balled}h</span></div>`;
      if (s.outside_temperature_celsius != null) details += `<div class="detail"><span class="detail-label">Outside Temp</span><span class="detail-value">${s.outside_temperature_celsius}&deg;C</span></div>`;
      if (s.temperature) details += `<div class="detail"><span class="detail-label">Ferment. Temp</span><span class="detail-value">${s.temperature.join(', ')}</span></div>`;

      let problems = '';
      if (s.problems_with_dough && s.problems_with_dough.length && !s.problems_with_dough.includes('None')) {
        problems = `<div class="problems">${s.problems_with_dough.map(p => `<span class="problem-tag">${escapeHtml(p)}</span>`).join(' ')}</div>`;
      }

      const notes = s.session_notes ? `<div class="notes">${escapeHtml(s.session_notes)}</div>` : '';
      const guests = s.guests ? `<div class="guests">Guests: ${escapeHtml(s.guests)}</div>` : '';

      // Pizzaioli names
      const pNames = (s.pizzaiolo_ids || []).map(id => pizzaioloMap[id] ? pizzaioloMap[id].name : '').filter(Boolean);
      const pizzaioloStr = pNames.length > 0 ? `<span class="session-pizzaiolo">${pNames.join(', ')}</span>` : '';

      sessionsHTML += `
<div class="session-card">
  <div class="card-header">
    <div class="card-title">
      <h3>${s.session_number ? `Session #${s.session_number}` : 'Pizza Session'}</h3>
      <span class="card-date">${dateStr}</span>
      ${pizzaioloStr}
    </div>
    <div class="card-ratings">
      ${s.dough_satisfaction ? '<div class="rating-item"><span class="rating-label">Dough</span>' + starRating(s.dough_satisfaction, 10) + '</div>' : ''}
    </div>
  </div>
  ${pizzaStrip}
  ${doughPhotos ? '<div class="photo-grid">' + doughPhotos + '</div>' : ''}
  ${details ? '<div class="details-grid">' + details + '</div>' : ''}
  ${problems}
  ${guests}
  ${notes}
</div>
`;
    }
  }
  document.getElementById('session-cards').innerHTML = sessionsHTML;

  // Show app, hide loading
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Init interactions
  initTabs();
  initScrollAnimations();
}

function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
}

function initScrollAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
});

loadData().catch(err => {
  console.error('Failed to load data:', err);
  document.getElementById('loading').innerHTML = '<div class="loading-text" style="color: var(--accent)">Failed to load data. Please try again later.</div>';
});
</script>
</body>
</html>
